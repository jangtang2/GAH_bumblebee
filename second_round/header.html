<!-- 상단 메뉴 배경 색상 변경 스크립트(PC) -->
<script>
  (function () {
    if (window.innerWidth < 992) return;

    let initialized = false;

    function initMenu() {
      if (initialized) return true;

      const navElement = document.querySelector('#s2025070198187fb0bd6e3');
      if (!navElement) return false;

      const sections = document.querySelectorAll('.section_wrap.pc_section');
      if (sections.length === 0) return false;

      const darkSections = [
        's202507015b37210bd8139',
        's202507012de9911fded25',
        's20250826cb316a1ecba50',
        's202507018d8322a2fd389',
        's202507015a429359b165a',
        's20250701f457bab25e7df'
      ];

      const lightSections = [
        's20250701dbcd534faee2c',
        's20250701cfd3071397a2a',
        's2025070113fe458cba567'
      ];

      const excludedSections = [''];

      const textSpans = navElement.querySelectorAll('.custom-flow-wrap span');
      const menu = navElement.querySelectorAll('.menuToggle.customMenu');
      const menuDivs = navElement.querySelectorAll('.menuToggle.customMenu p');
      const globalTexts = navElement.querySelectorAll('.global_text');

      const navStyles = {
        opaque: {
          backgroundColor: 'rgba(30, 26, 59, 0.25)',
          color: '#fff',
          borderColor: 'rgba(255, 255, 255, 0.2)',
        },
        light: {
          backgroundColor: '#fff',
          color: '#1e1a3b',
          borderColor: 'rgba(30, 26, 59, 0.2)',
        },
        dark: {
          backgroundColor: '#1e1a3b',
          color: '#fff',
          borderColor: 'rgba(255, 255, 255, 0.2)',
        },
      };

      function updateStyles(currentStyle) {
        Object.assign(navElement.style, {
          backgroundColor: currentStyle.backgroundColor,
          color: currentStyle.color,
          borderColor: currentStyle.borderColor,
        });

        textSpans.forEach((span) => {
          span.style.color = currentStyle.color;
        });

        menuDivs.forEach((p) => {
          p.style.setProperty('background-color', currentStyle.color, 'important');
        });

        menu.forEach((div) => {
          div.style.borderColor = currentStyle.borderColor;
        });

        globalTexts.forEach((text) => {
          text.style.color = currentStyle.color;
        });

        const krWidget = document.querySelector('#w20250826fabef1ba6c6de');
        if (krWidget) {
          krWidget.style.borderTopColor = currentStyle.borderColor;
        }
      }

      menu.forEach(function (menuBtn) {
        menuBtn.addEventListener('click', function () {
          const expanded = this.getAttribute('aria-expanded') === 'true';
          if (!expanded) {
            updateStyles(navStyles.dark);
          } else {
            setTimeout(() => {
              updateStyles(navStyles.light);
            }, 1600);
          }
        });
      });

      sections.forEach((section, index) => {
        if (excludedSections.includes(section.id)) return;
        if (darkSections.includes(section.id)) {
          section.dataset.background = 'dark';
        } else if (lightSections.includes(section.id)) {
          section.dataset.background = 'light';
        } else if (index !== 0 && index <= 3) {
          section.dataset.background = 'opaque';
        } else {
          section.dataset.background = 'light';
        }
      });

      function updateNavBackground() {
        if (window.pageXOffset === 0 && window.pageYOffset === 0) {
          updateStyles(navStyles.light);
          return;
        }

        let currentStyle = null;
        let targetSection = null;
        let minDistance = Infinity;

        sections.forEach((section) => {
          const rect = section.getBoundingClientRect();
          if (excludedSections.includes(section.id)) return;

          if (rect.left <= 50 && rect.left > -rect.width && rect.right > 100 && rect.width > 0) {
            const distance = Math.abs(rect.left);
            if (distance <= minDistance) {
              minDistance = distance;
              targetSection = section;
            }
          }
        });

        if (targetSection && targetSection.dataset.background) {
          currentStyle = navStyles[targetSection.dataset.background];
        }

        if (!currentStyle) currentStyle = navStyles.light;

        if (currentStyle && navElement.style.backgroundColor !== currentStyle.backgroundColor) {
          updateStyles(currentStyle);
        }
      }

      window.addEventListener('scroll', updateNavBackground);
      Object.assign(navElement.style, navStyles.light);
      updateNavBackground();

      initialized = true;
      return true;
    }

    let attemptCount = 0;
    const maxAttempts = 30;

    function tryInitialize() {
      if (initialized) return;
      attemptCount++;
      if (initMenu()) return;
      if (attemptCount < maxAttempts) setTimeout(tryInitialize, 200);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', tryInitialize);
    } else {
      tryInitialize();
    }

    window.addEventListener('load', function() {
      setTimeout(tryInitialize, 100);
      setTimeout(tryInitialize, 500);
      setTimeout(tryInitialize, 1000);
    });

  })();
</script>

      function updateStyles(currentStyle) {

      menu.forEach(function (menuBtn) {
        menuBtn.addEventListener('click', function () {
          const expanded = this.getAttribute('aria-expanded') === 'true';
          const targetWidget = document.querySelector('#w20250701fac9bf184a6aa');

          if (!expanded) {
            updateStyles(navStyles.dark);
            if (targetWidget) targetWidget.style.setProperty('display', 'block', 'important');
          } else {
            setTimeout(() => {
              updateStyles(navStyles.opaque);
              if (targetWidget) targetWidget.style.setProperty('display', 'none', 'important');
            }, 1600);
          }
        });
      });

      sections.forEach((section, index) => {
        if (excludedSections.includes(section.id)) return;
        if (darkSections.includes(section.id)) {
          section.dataset.background = 'dark';
        } else if (lightSections.includes(section.id)) {
          section.dataset.background = 'light';
        } else if (index <= 3) {
          section.dataset.background = 'opaque';
        } else {
          section.dataset.background = 'light';
        }
      });

      function updateNavBackground() {
        let currentStyle = navStyles['opaque'];

        sections.forEach((section) => {
          const rect = section.getBoundingClientRect();
          if (excludedSections.includes(section.id)) return;

          if (rect.top <= 30 && window.pageYOffset !== 0) {
            currentStyle = navStyles[section.dataset.background];
          }
        });

        if (currentStyle && navElement.style.backgroundColor !== currentStyle.backgroundColor) {
          updateStyles(currentStyle);
        }
      }

      window.addEventListener('scroll', updateNavBackground, { passive: true });
      updateNavBackground();

      initialized = true;
      return true;
    }

    let attemptCount = 0;
    const maxAttempts = 30;

    function tryInitialize() {
      if (initialized) return;
      attemptCount++;

      setTimeout(tryInitialize, 500);
      setTimeout(tryInitialize, 1000);
    });

</script>
